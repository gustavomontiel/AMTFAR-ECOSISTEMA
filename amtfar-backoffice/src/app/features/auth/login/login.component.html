<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-cover bg-center relative" style="background-image: url('https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=2000&auto=format&fit=crop');">
  <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-md"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-fade-in-up">
    <div class="mx-auto h-20 w-20 bg-amtfar-primary rounded-2xl flex items-center justify-center shadow-2xl shadow-amtfar-primary/40 mb-6">
       <i class="fas fa-chart-pie text-4xl text-white"></i>
    </div>
    <h2 class="text-center text-3xl font-black text-white tracking-tight">
      Portal de Auditoría
    </h2>
    <p class="mt-2 text-center text-sm text-amtfar-primary font-bold tracking-widest uppercase">
      Backoffice FATFA
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-fade-in-up" style="animation-delay: 0.1s;">
    <div class="bg-white py-10 px-8 border-b-8 border-amtfar-primary shadow-2xl rounded-3xl sm:px-12">
      <form class="space-y-6" (ngSubmit)="login()">
        <div>
          <label for="usuario" class="block text-sm font-bold text-slate-700">Usuario Administrador</label>
          <div class="mt-2 relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fas fa-user-shield text-slate-400"></i>
            </div>
            <input id="usuario" name="usuario" type="text" [ngModel]="usuario()" (ngModelChange)="usuario.set($event)" required class="appearance-none block w-full pl-11 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amtfar-primary focus:border-transparent transition-all sm:text-sm" placeholder="Ej: admin">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-bold text-slate-700">Contraseña SEGURA</label>
          <div class="mt-2 relative rounded-xl shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fas fa-lock text-slate-400"></i>
            </div>
            <input id="password" name="password" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" required class="appearance-none block w-full pl-11 pr-3 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amtfar-primary focus:border-transparent transition-all sm:text-sm" placeholder="••••••••">
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="isLoading()" class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl shadow-lg shadow-amtfar-primary/40 text-[15px] font-bold text-white bg-amtfar-primary hover:bg-amtfar-secondary hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-amtfar-primary/50 transition-all duration-300 disabled:opacity-70 disabled:hover:translate-y-0">
            @if(isLoading()) {
              <i class="fas fa-circle-notch fa-spin mr-2"></i> Verificando Acceso...
            } @else {
              INGRESAR A LA TERMINAL
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
