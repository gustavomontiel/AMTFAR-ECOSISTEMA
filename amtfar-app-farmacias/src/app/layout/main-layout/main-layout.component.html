<div class="min-h-screen flex flex-col antialiased bg-amtfar-background text-slate-800">
  <!-- Header Navbar -->
  <header class="bg-white text-slate-800 shadow-sm z-20 h-16 flex items-center justify-between px-4 lg:px-8 border-b border-slate-200 sticky top-0">
    <div class="flex items-center gap-4">
      <button (click)="toggleMenu()" class="lg:hidden p-2 rounded-md hover:bg-slate-100 text-slate-500 hover:text-amtfar-primary transition-colors" aria-label="Abrir Menú">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>
      <div class="flex items-center gap-3">
        <img src="logo-amtfar.webp" alt="Logo AMTFAR" class="h-10 w-auto">
        <h1 class="text-xl font-black tracking-tight hidden sm:flex items-center">
          <span class="text-amtfar-primary">AMT</span><span class="text-slate-900">FAR</span>
          <span class="text-slate-500 font-medium ml-2 text-lg">Farmacias</span>
        </h1>
      </div>
    </div>
    
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex flex-col items-end mr-2" *ngIf="user">
        <span class="text-sm font-medium text-slate-800">{{ user.farmacia }}</span>
        <span class="text-xs text-slate-500">Usuario: {{ user.username }} ({{ user.rol }})</span>
      </div>
      <div class="h-10 w-10 rounded-full bg-amtfar-primary_dark border border-slate-200 flex items-center justify-center font-semibold overflow-hidden shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-white mt-1">
          <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
        </svg>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar / Menú Lateral -->
    <aside [class.translate-x-0]="isMenuOpen" [class.-translate-x-full]="!isMenuOpen" 
           class="bg-white w-64 shadow-xl lg:shadow-none border-r border-slate-200 fixed lg:relative z-10 lg:translate-x-0 h-[calc(100vh-4rem)] transition-transform duration-300 ease-in-out flex flex-col">
      <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">
        <a routerLink="/app/dashboard" routerLinkActive="bg-amtfar-secondary text-amtfar-primary" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-amtfar-primary rounded-xl font-medium transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          Inicio
        </a>
        
        <a routerLink="/app/boletas" routerLinkActive="bg-amtfar-secondary text-amtfar-primary" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-amtfar-primary rounded-xl font-medium transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
          </svg>
          Boletas
        </a>

        <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-amtfar-primary rounded-xl font-medium transition-colors group">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 group-hover:scale-110 transition-transform">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
          Empleados
        </a>
      </nav>
      
      <div class="p-4 border-t border-slate-200">
        <button (click)="logout()" class="flex items-center gap-3 px-4 py-3 w-full text-red-600 hover:bg-red-50 rounded-xl font-medium transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
          Cerrar Sesión
        </button>
      </div>
    </aside>

    <!-- Overlay para móviles -->
    <div *ngIf="isMenuOpen" (click)="toggleMenu()" class="fixed inset-0 bg-slate-900/50 z-0 lg:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Contenido Principal -->
    <main class="flex-1 overflow-y-auto p-4 lg:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
