<div class="min-h-screen relative flex items-center justify-center bg-amtfar-background py-12 px-4 sm:px-6 lg:px-8 overflow-hidden">
  
  <!-- Fondo decorativo tipo Landing -->
  <div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-amtfar-primary blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-amtfar-accent blur-3xl"></div>
  </div>

  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl z-10 border border-slate-100 relative">
    
    <!-- Ribete superior -->
    <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-amtfar-primary via-amtfar-secondary to-amtfar-primary rounded-t-2xl"></div>

    <div class="text-center">
      <img class="mx-auto h-16 w-auto mb-2" src="logo-amtfar.webp" alt="AMTFAR Logo">
      <h1 class="text-3xl font-black tracking-tight flex items-center justify-center">
        <span class="text-amtfar-primary">AMT</span><span class="text-slate-900">FAR</span>
      </h1>
      <h2 class="mt-2 text-xl font-bold text-slate-800">
        Portal de Farmacias
      </h2>
      <p class="mt-2 text-sm text-slate-500">
        Inicia sesión para gestionar tus boletas y aportes.
      </p>
    </div>
    
    <form class="mt-8 space-y-6" (ngSubmit)="login()">
      
      <!-- Error Message -->
      @if (hasError()) {
      <div class="bg-red-50 text-red-600 px-4 py-3 rounded-xl text-sm font-medium flex items-start gap-2 animate-pulse-fast">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        Usuario o contraseña incorrectos.
      </div>
      }

      <div class="space-y-4">
        <div>
          <label for="cuit" class="block text-sm font-medium text-slate-700">Número de CUIT</label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
              </svg>
            </div>
            <input id="cuit" name="cuit" type="text" [(ngModel)]="cuit" required 
                   class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amtfar-primary focus:border-amtfar-primary sm:text-sm transition-shadow" 
                   placeholder="Ingresa tu CUIT (11 dígitos, sin guiones)">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700">Contraseña</label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-slate-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
              </svg>
            </div>
            <input id="password" name="password" [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" required 
                   class="appearance-none block w-full pl-10 pr-10 py-3 border border-slate-300 rounded-xl placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amtfar-primary focus:border-amtfar-primary sm:text-sm transition-shadow" 
                   placeholder="••••••••">
            
            <button type="button" tabindex="-1" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-amtfar-primary transition-colors focus:outline-none z-10 cursor-pointer">
              @if (!showPassword()) {
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
              </svg>
              }
              @if (showPassword()) {
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
              }
            </button>
          </div>
        </div>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-amtfar-primary focus:ring-amtfar-primary border-slate-300 rounded cursor-pointer">
          <label for="remember-me" class="ml-2 block text-sm text-slate-700 cursor-pointer">
            Recordarme
          </label>
        </div>

        <div class="text-sm">
          <a href="#" class="font-medium text-amtfar-primary hover:text-amtfar-primary_dark transition-colors">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading() || !cuit() || !password()" 
                class="amtfar-btn-primary w-full flex justify-center py-3 text-base disabled:opacity-70 disabled:cursor-not-allowed group relative overflow-hidden">
          
          @if (!isLoading()) {
          <span class="flex items-center gap-2">
            Iniciar Sesión
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 group-hover:translate-x-1 transition-transform">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </span>
          }

          @if (isLoading()) {
          <span class="flex items-center gap-2">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Procesando...
          </span>
          }
        </button>
      </div>
    </form>
    
    <!-- Footer info -->
    <p class="text-center text-xs text-slate-400 mt-6 border-t border-slate-100 pt-6">
      &copy; 2026 Asociación Mutual de Trabajadores de Farmacias.<br>
      Todos los derechos reservados.
    </p>
  </div>
</div>
